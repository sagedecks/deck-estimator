// ═══════════════════════════════════════════════════════════════
// CALC — mirrors pricebook material takeoff formulas
// ═══════════════════════════════════════════════════════════════
function calc(d, mode) {
  let raw = 0; // accumulate raw cost, apply GP at the end
  const tier = d.deckingMaterial;
  if (!tier || !d.sqft) return { low: 0, high: 0 };

  const sqft = d.sqft;
  const boardPrice = tierAvg(MAT.board, tier);
  const fascia12Price = tierAvg(MAT.fascia12, tier);
  const fascia8Price = tierAvg(MAT.fascia8, tier);

  const hMap = { "ground": 1, "few-steps": 3.5, "elevated": 8, "not-sure": 0 };
  // Detailed mode uses exact height input; simple uses category mapping
  const deckHt = (mode === "detailed" && d.exactHeight > 0) ? d.exactHeight : (hMap[d.deckHeight] || 0);
  const isUnsure = d.deckHeight === "not-sure" && !(mode === "detailed" && d.exactHeight > 0);
  const isElevated = d.deckHeight === "elevated" || (mode === "detailed" && d.exactHeight >= 6);

  // ── MAIN DECK ──
  // Deck boards: ceil(0.155 × sqft) × boardPrice
  raw += ru(0.155 * sqft) * boardPrice;
  // 2x4x12 lumber: ceil(0.0125 × sqft) × $7.53
  raw += ru(0.0125 * sqft) * MAT.lumber2x4x12;
  // Treated 2x10x12: ceil(0.0075 × sqft) × $37.61
  raw += ru(0.0075 * sqft) * MAT.lumber2x10x12treated;
  // 2x10x12 joists: ceil(0.1 × sqft) × $24.30
  raw += ru(0.1 * sqft) * MAT.lumber2x10x12;
  // Hardware/Fasteners: 1 × sqft × $1.10
  raw += sqft * MAT.hardwareFasteners;
  // LedgerLok: 0.5 per deck (fixed) × $54.15
  raw += 0.5 * MAT.ledgerLok50ct;
  // DTT2Z Tension Tie: 2 per deck × $20
  raw += 2 * MAT.dtt2z;
  // Metal flashing: 2 per deck × $10
  raw += 2 * MAT.flashingMetal;
  // Camo Edge Clips: ceil(0.004 × sqft) × $266
  raw += ru(0.004 * sqft) * MAT.camoClips250;
  // Joist Tape: ceil(0.0175 × sqft) × $30.15
  raw += ru(0.0175 * sqft) * MAT.joistTape3;
  // Install Labor: 1 × sqft × $7
  raw += sqft * 7;

  // ── PERIMETER (Fascia + Picture Frame) ──
  let peri;
  if (mode === "simple") {
    const w = Math.sqrt(sqft * 0.6);
    const l = sqft / w;
    peri = Math.round((w + l + w) * 1.15);
  } else {
    peri = d.perimeter || 0;
  }
  // Fascia 1x12: ceil(0.093 × peri) × fascia12Price
  raw += ru(0.093 * peri) * fascia12Price;
  // Picture frame board 1x6: ceil(0.0625 × peri) × boardPrice
  raw += ru(0.0625 * peri) * boardPrice;
  // Perimeter labor: 1 × peri × $2
  raw += peri * 2;

  // ── STRUCTURAL (Posts, Beams, Footings) ──
  // Post height scales with deck height selection
  // ground=1ft, few-steps=3.5ft, elevated=8ft, not-sure=4ft avg
  let postHeight = deckHt > 0 ? deckHt : (isUnsure ? 4 : 2);

  let postCount, ftgCount, beamLinFt;

  if (mode === "simple") {
    // Calculate beam length from deck dimensions
    // Beam runs along the width (house wall side) — typically the longer dimension
    const w = Math.sqrt(sqft * 0.6);
    const l = sqft / w;
    const longerSide = Math.max(w, l);

    beamLinFt = Math.round(longerSide * 1.1);

    // Footings: 1 per 10ft of beam + 1 at the end (minimum 2)
    ftgCount = Math.max(2, ru(beamLinFt / 10) + 1);

    // Posts = footings (1:1 match)
    postCount = ftgCount;
  } else {
    // Detailed mode: use user-entered values or per-section data
    const sectionDetails = d._sectionDetails || [];
    const hasMultiSections = sectionDetails.length > 1;

    if (hasMultiSections) {
      // Multi-section: calculate structure per section, sum totals
      postCount = 0; ftgCount = 0; beamLinFt = 0;
      const sections = d._deckSections || [{ w: "", l: "" }];
      sections.forEach((sec, idx) => {
        const sd = sectionDetails[idx] || {};
        const sw = Number(sec.w) || 0;
        const sl = Number(sec.l) || 0;
        const secBeam = sw > 0 ? Math.round(sw * 1.1) : 0;
        const secFtg = secBeam > 0 ? Math.max(2, ru(secBeam / 10) + 1) : 0;
        beamLinFt += secBeam;
        ftgCount += secFtg;
        postCount += secFtg;
        // Per-section post cost with section-specific height
        const secPostHeight = sd.height || d.exactHeight || 2;
        raw += secFtg * (secPostHeight * MAT.post6x6perFt + MAT.postBase + MAT.wedgeAnchor + 35);
      });
      // Beam for all sections
      raw += 0.75 * beamLinFt * MAT.glulamPerFt;
    } else {
      // Single section detailed — auto-calc defaults if user hasn't set them
      // Beam runs along the width (house wall side) — use actual entered width if available
      const sections = d._deckSections || [];
      const enteredWidth = sections[0] ? Number(sections[0].w) || 0 : 0;
      const enteredLength = sections[0] ? Number(sections[0].l) || 0 : 0;
      // Beam = the wider dimension (typically width along house)
      const autoBeamFromSections = Math.max(enteredWidth, enteredLength);
      const autoBeamFromSqft = Math.round(Math.max(Math.sqrt(sqft * 0.6), sqft / Math.sqrt(sqft * 0.6)) * 1.1);
      const autoBeam = autoBeamFromSections > 0 ? Math.round(autoBeamFromSections * 1.1) : (d.perimeter ? Math.round(d.perimeter * 0.4) : autoBeamFromSqft);
      beamLinFt = d.beamLinFt || autoBeam;
      const autoFtg = Math.max(2, ru(beamLinFt / 10) + 1);
      ftgCount = d.footingCount || autoFtg;
      postCount = d.postCount || ftgCount;
      if (d.postHeight > 0) postHeight = d.postHeight;
      // Posts + beam
      raw += postCount * (postHeight * MAT.post6x6perFt + MAT.postBase + MAT.wedgeAnchor + 35);
      raw += 0.75 * beamLinFt * MAT.glulamPerFt;
    }
  }
  // Footings
  // Footings — type determines cost per footing
  const stdFootingCost = 3 * MAT.concrete60lb + MAT.rebar72 + 0.33 * MAT.sonotube + MAT.footingLabor;
  const engFootingCost = 20 * MAT.concrete60lb + 3 * MAT.rebar72 + MAT.sonotube + MAT.engFootingLabor;
  const needsAllEng = d.footingType === "engineered" || d.wantsShade;

  if (needsAllEng) {
    raw += ftgCount * engFootingCost;
  } else if (d.footingType === "mixed") {
    // Mixed: assume ~30% engineered + 70% standard (typical real-world mix)
    const engCount = Math.max(1, Math.round(ftgCount * 0.3));
    const stdCount = ftgCount - engCount;
    raw += stdCount * stdFootingCost + engCount * engFootingCost;
  } else {
    raw += ftgCount * stdFootingCost;
  }

  // ── RAILING POST & PANEL COUNTS (used by railing + lighting) ──
  const stairStepCalcForRail = d.stairStepCount > 0 ? d.stairStepCount : ((d.hasStairs && deckHt > 1) ? ru((deckHt * 12) / P.risePerStep) : 0);
  let railTotalPosts = 0;
  let railLevelPosts = 0;

  if (d.hasRailing && (d.railingLinFt || d.levelRailLinFt)) {
    // Detailed mode: use separate level/stair inputs if available
    const hasDetailedRail = mode === "detailed" && (d.levelRailLinFt > 0 || d.stairRailLinFt > 0);
    let levelLinFt, stairPanelsTotal, stairPosts, levelPanels;

    if (hasDetailedRail) {
      levelLinFt = d.levelRailLinFt || 0;
      const stairRLF = d.stairRailLinFt || 0;
      stairPanelsTotal = stairRLF > 0 ? ru(stairRLF / 8) : 0;
      stairPosts = stairRLF > 0 ? 4 : 0;
      // Use user-entered counts if available, otherwise auto-calc
      railLevelPosts = d.railPostCount > 0 ? d.railPostCount - stairPosts : (levelLinFt > 0 ? ru(levelLinFt / 8) + 1 : 0);
      levelPanels = d.railPanelCount > 0 ? d.railPanelCount - stairPanelsTotal : (levelLinFt > 0 ? Math.max(1, railLevelPosts - 1) : 0);
      railTotalPosts = d.railPostCount > 0 ? d.railPostCount : railLevelPosts + stairPosts;
    } else {
      // Simple mode: derive from total railingLinFt
      const rlf = d.railingLinFt;
      const stairPanelsPerSide = stairStepCalcForRail > 0 ? ru(stairStepCalcForRail / 7) : 0;
      stairPanelsTotal = stairPanelsPerSide * 2;
      stairPosts = stairStepCalcForRail > 0 ? 4 : 0;
      const stairRailLinFt = stairPanelsTotal * 8;
      levelLinFt = Math.max(0, rlf - stairRailLinFt);
      railLevelPosts = levelLinFt > 0 ? ru(levelLinFt / 8) + 1 : 0;
      levelPanels = levelLinFt > 0 ? Math.max(1, railLevelPosts - 1) : 0;
      railTotalPosts = railLevelPosts + stairPosts;
    }

    const totalRailLabor = (d.levelRailLinFt || 0) + (d.stairRailLinFt || 0) || d.railingLinFt || 0;

    // ── RAILING COST ──
    if (d.railingType) {
      if (d.railingType === "steel") {
        raw += railTotalPosts * (MAT.cinchPost + 0.16 * MAT.grkLags25ct + MAT.railPostInstall);
        raw += levelPanels * MAT.cinchLevelPanel8;
        raw += stairPanelsTotal * MAT.cinchStairPanel8;
        raw += stairPanelsTotal * MAT.cinchStairBracket;
        raw += totalRailLabor * MAT.steelRailLabor;

      } else if (d.railingType === "aluminum") {
        raw += railTotalPosts * (MAT.alumPost + 0.16 * MAT.grkLags25ct + MAT.railPostInstall);
        raw += levelPanels * MAT.alumLevelPanel8;
        raw += stairPanelsTotal * MAT.alumStairPanel8;
        raw += stairPanelsTotal * MAT.alumStairBracket;
        raw += totalRailLabor * MAT.alumRailLabor;

      } else if (d.railingType === "custom") {
        raw += totalRailLabor * MAT.customRailLabor;
        raw += totalRailLabor * 109; // fixed $215/lf selling, ±10% = $193-$237 range
      }
    }
  }

  // ── STAIRS ──
  const sectionDetails = d._sectionDetails || [];
  const hasMultiSections = sectionDetails.length > 1;

  if (hasMultiSections && mode === "detailed") {
    // Multi-section: calculate stairs per section
    sectionDetails.forEach(sd => {
      if (!sd.hasStairs) return;
      const secSteps = sd.stairStepCount || (sd.height > 0 ? ru((sd.height * 12) / 7.5) : 0);
      if (secSteps <= 0) return;
      const secWidth = sd.stairWidth || 4;
      const secSets = sd.stairSets || 1;
      for (let s = 0; s < secSets; s++) {
        raw += ru(0.334 * secSteps) * fascia12Price;
        raw += secSteps * MAT.wedgeAnchor;
        const ws = secWidth * secSteps;
        raw += ru(0.125 * ws) * boardPrice;
        raw += ru(0.0833 * ws) * fascia8Price;
        raw += ru(0.08 * ws) * MAT.compositeScrews100;
        raw += 2 * ws * MAT.hardwareFasteners;
        raw += ru(0.11 * ws) * MAT.lumber2x12x16treated;
        raw += ru(0.055 * ws) * MAT.lumber2x4x12treated;
        raw += secWidth * secSteps * 17;
      }
    });
  } else {
    // Single section stair calc
    const stairWidth = mode === "simple" ? 4 : (d.stairWidth || 4);
    const stairSets = mode === "simple" ? 1 : (d.stairSets || 1);
    const stairStepCalc = d.stairStepCount > 0 ? d.stairStepCount : (deckHt > 0 ? ru((deckHt * 12) / P.risePerStep) : 0);

    if (d.hasStairs && stairStepCalc > 0) {
      const steps = stairStepCalc;
      for (let s = 0; s < stairSets; s++) {
        raw += ru(0.334 * steps) * fascia12Price;
        raw += steps * MAT.wedgeAnchor;
        const ws = stairWidth * steps;
        raw += ru(0.125 * ws) * boardPrice;
        raw += ru(0.0833 * ws) * fascia8Price;
        raw += ru(0.08 * ws) * MAT.compositeScrews100;
        raw += 2 * ws * MAT.hardwareFasteners;
        raw += ru(0.11 * ws) * MAT.lumber2x12x16treated;
        raw += ru(0.055 * ws) * MAT.lumber2x4x12treated;
        raw += stairWidth * steps * 17;
      }
    }
  }
  // stairStepCalc for railing/lighting reference
  const stairStepCalc = d.stairStepCount > 0 ? d.stairStepCount : (deckHt > 0 ? ru((deckHt * 12) / P.risePerStep) : 0);

  // ── UPGRADES ──
  (d.upgrades || []).forEach(k => {
    switch(k) {
      case "deck-lighting": {
        // Controller: always 1
        raw += MAT.lightController;

        // Post cap lights: use override if set, else railing post count
        const capCount = d.postCapLightCount > 0 ? d.postCapLightCount : (railTotalPosts > 0 ? railTotalPosts : 0);
        if (capCount > 0) {
          raw += capCount * (MAT.postCapLight + MAT.lightInstallLabor);
        }

        // Stair lights: detailed mode uses override, simple uses 1.5× steps
        const sLightCount = d.stairLightCount > 0 ? d.stairLightCount : (d.hasStairs && stairStepCalc > 0 ? ru(stairStepCalc * 1.5) : 0);
        if (sLightCount > 0) {
          raw += sLightCount * (MAT.stairLight + MAT.lightInstallLabor);
        }
        break;
      }
      case "ceiling-lighting": {
        // Detailed mode: use ceilLightCount override if set
        // Simple mode: scale by deck size
        const ceilFixtures = d.ceilLightCount > 0 ? d.ceilLightCount : (sqft <= 175 ? 3 : sqft <= 300 ? 5 : sqft <= 500 ? 8 : 11);
        raw += ceilFixtures * 200;
        break;
      }
      case "drainage": {
        // Waterproofing per sqft
        raw += ru(0.0635 * sqft) * MAT.troughRoll12;
        raw += ru(0.0175 * sqft) * MAT.butylTape;
        raw += ru(0.031 * sqft) * MAT.butylCaulk;
        raw += ru(0.07 * sqft) * MAT.rainDownspout;
        raw += sqft * MAT.rainLabor;
        // Rain gutter / downspout install: ~$65/linft selling along deck width
        // Estimate deck width from sqft (shorter dimension)
        const gutterWidth = mode === "simple" ? Math.round(Math.sqrt(sqft * 0.6)) : Math.round(Math.sqrt(sqft * 0.6));
        raw += gutterWidth * MAT.gutterPerLinFt;
        break;
      }
      case "ceiling": {
        // Detailed mode: use selected ceiling type. Quick: midpoint of all three.
        let ceilRate;
        if (d.ceilingType === "aluminum") ceilRate = MAT.aluminumCeilingRate;
        else if (d.ceilingType === "tg") ceilRate = MAT.tgCeilingRate;
        else if (d.ceilingType === "bb") ceilRate = MAT.bbCeilingRate;
        else ceilRate = (MAT.aluminumCeilingRate + MAT.tgCeilingRate + MAT.bbCeilingRate) / 3;
        raw += sqft * ceilRate;
        break;
      }
      case "drink-top": {
        // Drink top runs along the railing — only applies if railing is included
        const dtLinFt = (d.hasRailing && d.railingLinFt) ? d.railingLinFt : 0;
        if (dtLinFt > 0) {
          raw += ru(0.0625 * dtLinFt) * boardPrice;
          raw += ru(0.125 * dtLinFt) * MAT.railFlushBracket;
          raw += dtLinFt * MAT.drinkTopLabor;
        }
        break;
      }
      case "seating": raw += 3000; break;
      case "hot-tub": raw += 3200; break;
      case "inlays": raw += 2800; break;
      case "curved": raw += 4000; break;
      case "skirting": {
        // Cladding sqft = (deck height - 1ft for fascia) × perimeter (3 sides)
        // Height comes from deck height selection; perimeter already calculated
        const claddingHeight = Math.max(0, (deckHt > 0 ? deckHt : (isUnsure ? 4 : 2)) - 1);
        const claddingSqFt = claddingHeight * peri;
        if (claddingSqFt > 0) {
          // Deck board: ceil(0.125 × sqft) × boardPrice (tier-dependent)
          raw += ru(0.125 * claddingSqFt) * boardPrice;
          // Treated 2x4: ceil(0.0825 × sqft) × $16.30
          raw += ru(0.0825 * claddingSqFt) * MAT.lumber2x4x12treated;
          // Composite screws: ceil(0.03 × sqft) × $16
          raw += ru(0.03 * claddingSqFt) * MAT.compositeScrews100;
          // Cladding labor: sqft × $4.50
          raw += claddingSqFt * MAT.claddingLabor;
        }
        break;
      }
      default: break;
    }
  });

  // ── DEMO ──
  if (d.needsDemo) raw += (d.demoSqFt || sqft) * MAT.demoLabor;

  // ── APPLY GP MARKUP ──
  const selling = markup(raw, d.state);

  // ── RANGE ──
  // Detailed mode: ±4% (user gave exact measurements)
  // Simple mode: ±8% (covers shape variability)
  const baseRange = mode === "detailed" ? 0.04 : P.rangeLow;
  const r = P.roundTo;
  const lowMult = isUnsure ? baseRange + 0.04 : baseRange;
  const highMult = isUnsure ? baseRange + 0.06 : baseRange;

  return {
    low: Math.max(Math.round((selling * (1 - lowMult)) / r) * r, 0),
    high: Math.round((selling * (1 + highMult)) / r) * r,
  };
}

        <span style={{ fontFamily: F, fontSize: lg ? 14 : 12, fontWeight: 600, color: sel ? C.text : C.text, display: "block" }}>{label}</span>
        {desc && <span style={{ fontFamily: F, fontSize: lg ? 12 : 10, color: C.muted, marginTop: 2, display: "block" }}>{desc}</span>}
      </div>
      {sel && <div style={{ position: "absolute", top: 8, right: 8, width: 24, height: 24, borderRadius: "50%", background: "#4CAF50", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, color: "#fff", fontWeight: 700 }}>✓</div>}
    </button>

  const UpRow = ({ label, desc, cost, sel, onClick }) => (
    <button onClick={onClick} style={{ display: "flex", alignItems: "center", gap: lg ? 14 : 10, width: "100%", padding: lg ? "14px 16px" : "10px 12px", background: sel ? "rgba(76,175,80,0.06)" : C.card, border: `1.5px solid ${sel ? "#4CAF50" : C.border}`, borderRadius: 12, cursor: "pointer", textAlign: "left", transition: "all 0.2s" }}>

      <div style={{ flex: 1 }}>
        <span style={{ fontFamily: F, fontSize: lg ? 15 : 13, fontWeight: 600, color: C.text, display: "block" }}>{label}</span>
        <span style={{ fontFamily: F, fontSize: lg ? 13 : 11, color: C.muted, display: "block", marginTop: 1 }}>{desc}</span>
      </div>
      <span style={{ fontFamily: F, fontSize: lg ? 14 : 12, fontWeight: 600, color: sel ? "#2E7D32" : C.dim, whiteSpace: "nowrap" }}>+{fmt(cost)}</span>

  );

  const NumIn = ({ label, value, onChange, min, max, st, suf, hint }) => {
    const open = expGuide === label;
    return (
      <div style={{ background: C.card, border: `1.5px solid ${C.border}`, borderRadius: 11, overflow: "hidden" }}>
        <button onClick={() => setExpGuide(open ? null : label)} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", width: "100%", padding: "10px 12px 4px", background: "none", border: "none", cursor: "pointer", textAlign: "left" }}>
          <div><span style={{ fontFamily: F, fontSize: 11, fontWeight: 700, color: C.muted, letterSpacing: "0.06em", textTransform: "uppercase" }}>{label}</span>{hint && <span style={{ fontFamily: F, fontSize: 10, color: C.dim, display: "block", marginTop: 1 }}>{hint}</span>}</div>
          <span style={{ fontSize: 10, color: C.accent, fontFamily: F, fontWeight: 600, whiteSpace: "nowrap", marginLeft: 6 }}>{open ? "Hide ▲" : "Guide ▼"}</span>
        </button>
        <div style={{ maxHeight: open ? 200 : 0, overflow: "hidden", transition: "max-height 0.3s ease" }}>
          <div style={{ margin: "6px 12px", borderRadius: 8, overflow: "hidden", border: `1px solid ${C.border}` }}>
            <img src={IMG.guides.default} alt="guide" style={{ width: "100%", height: lg ? 150 : 110, objectFit: "cover", display: "block" }} />
            <div style={{ padding: "6px 10px", background: C.aS, fontFamily: F, fontSize: 10, color: C.accent }}>ℹ️ {hint}</div>
          </div>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 6, padding: "6px 12px 10px" }}>
          <input type="number" value={value} min={min} max={max} step={st} onChange={e => onChange(Number(e.target.value))} style={{ flex: 1, background: C.bg, border: `1.5px solid ${C.border}`, borderRadius: 7, padding: "9px 11px", color: C.text, fontFamily: F, fontSize: 15, fontWeight: 600, outline: "none", width: "100%" }} onFocus={e => e.target.style.borderColor = C.accent} onBlur={e => e.target.style.borderColor = C.border} />
          {suf && <span style={{ fontFamily: F, fontSize: 11, color: C.muted, whiteSpace: "nowrap" }}>{suf}</span>}
        </div>
      </div>
    );
  };

  const TxtIn = ({ label, value, onChange, type = "text", ac }) => (
    <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
      <label style={{ fontFamily: F, fontSize: lg ? 11 : 9, fontWeight: 700, color: C.muted, letterSpacing: "0.08em", textTransform: "uppercase" }}>{label}</label>
      <input type={type} value={value} autoComplete={ac} onChange={e => onChange(e.target.value)} style={{ background: C.card, border: `1.5px solid ${C.border}`, borderRadius: 8, padding: lg ? "13px 14px" : "10px 11px", color: C.text, fontFamily: F, fontSize: lg ? 15 : 14, outline: "none", width: "100%" }} onFocus={e => e.target.style.borderColor = C.accent} onBlur={e => e.target.style.borderColor = C.border} />
    </div>
  );

  const canNext = () => {
    switch (cur) {
      case "size": case "structure": case "d-size": return d.sqft > 0;
      case "materials": return !!d.deckingMaterial;
      case "height-stairs": return !!d.deckHeight;
      case "d-height": return d.exactHeight >= 0;
      case "d-structural": return d.postCount >= 0 && d.footingCount >= 0;
      case "railing": case "d-railing": return !d.hasRailing || !!d.railingType;
      case "contact": return d.firstName && d.lastName && d.email && d.phone && d.state;
      default: return true;
    }
  };

  // ═══════ STEP CONTENT ═══════
  const content = () => {
    switch (cur) {
      case "size": return (<div>
        <Head t="How Big Is Your Deck Going To Be?" s="Don't worry about being exact — a rough size is perfect." />
        <Lbl t="Choose what feels closest" />
        <div style={{ display: "grid", gridTemplateColumns: cols4, gap: lg ? 14 : 10, marginBottom: 20 }}>
          {[
            { v: 150, l: "Small", img: "small", sub: "Great for a grill + seating area", dd: "~10×15 ft · 150 sq ft" },
            { v: 250, l: "Medium", img: "medium", sub: "Room for dining + a bit more space", dd: "~12×20 ft · 250 sq ft" },
            { v: 400, l: "Large", img: "large", sub: "Comfortable for entertaining", dd: "~16×25 ft · 400 sq ft" },
            { v: 600, l: "Extra Large", img: "xl", sub: "Big gatherings, multiple zones", dd: "~20×30 ft · 600 sq ft" },
          ].map(s => {
            const sel = d.sqft === s.v;
            return (
              <button key={s.v} onClick={() => up("sqft", s.v)} style={{
                background: sel ? "rgba(76,175,80,0.05)" : C.card,
                border: `2px solid ${sel ? "#4CAF50" : C.border}`,
                borderRadius: lg ? 14 : 12, padding: 0, overflow: "hidden",
                cursor: "pointer", textAlign: "left", transition: "all 0.2s", position: "relative",
                display: "flex", flexDirection: "column",
                boxShadow: sel ? "0 4px 20px rgba(76,175,80,0.1)" : "0 1px 4px rgba(0,0,0,0.04)",
              }}>
                {/* Hero image at top */}
                {IMG.sizes[s.img] && (
                  <div style={{ width: "100%", height: lg ? 140 : 110, backgroundImage: `url(${IMG.sizes[s.img]})`, backgroundSize: "cover", backgroundPosition: "center", position: "relative" }}>
                    <div style={{ position: "absolute", inset: 0, background: "linear-gradient(to top, rgba(255,255,255,0.7) 0%, rgba(255,255,255,0) 30%)" }} />
                  </div>
                )}
                {sel && <div style={{ position: "absolute", top: 8, right: 8, width: 26, height: 26, borderRadius: "50%", background: "#4CAF50", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, color: "#fff", fontWeight: 700, zIndex: 1, boxShadow: "0 2px 8px rgba(0,0,0,0.15)" }}>✓</div>}
                <div style={{ padding: lg ? "14px 16px 18px" : "12px 12px 14px", display: "flex", flexDirection: "column", flex: 1 }}>
                  <span style={{ fontFamily: F, fontSize: lg ? 18 : 15, fontWeight: 700, color: C.text, display: "block" }}>{s.l}</span>
                  <span style={{ fontFamily: F, fontSize: lg ? 13 : 11, color: C.muted, display: "block", marginTop: 4, lineHeight: 1.4 }}>{s.sub}</span>
                  <span style={{ fontFamily: F, fontSize: lg ? 12 : 10, color: C.dim, display: "block", marginTop: 6, fontWeight: 600 }}>{s.dd}</span>
                </div>
              </button>
            );
          })}
        </div>
        <Lbl t="Or enter your exact square footage" />
        <input type="number" value={d.sqft} min={50} max={5000} onChange={e => up("sqft", Number(e.target.value))} style={{ background: C.bg, border: `1.5px solid ${C.border}`, borderRadius: 8, padding: lg ? "12px 14px" : "9px 11px", color: C.text, fontFamily: F, fontSize: 16, fontWeight: 600, outline: "none", width: lg ? 220 : "100%" }} onFocus={e => e.target.style.borderColor = C.accent} onBlur={e => e.target.style.borderColor = C.border} />
      </div>);

      case "structure": return null; // deprecated — detailed mode uses d-size, d-height, d-structural

      // ═══════ DETAILED MODE STEPS ═══════

      case "d-size": {
        // Multi-section deck support
        const sections = d._deckSections || [{ w: "", l: "" }];
        const setSections = (newSections) => {
          const totalSqft = newSections.reduce((sum, s) => {
            const w = Number(s.w) || 0;
            const l = Number(s.l) || 0;
            if (w > 0 && l > 0) return sum + Math.round(w * l);
            return sum + (Number(s.sqft) || 0); // use direct sqft if no W×L
          }, 0);
          let totalPeri = 0;
          newSections.forEach(s => {
            const w = Number(s.w) || 0;
            const l = Number(s.l) || 0;
            if (w > 0 && l > 0) totalPeri += w + l + w;
            else if (Number(s.sqft) > 0) {
              // Estimate perimeter from sqft alone (assume ~0.6 ratio rectangle)
              const ew = Math.sqrt(Number(s.sqft) * 0.6);
              totalPeri += ew + (Number(s.sqft) / ew) + ew;
            }
          });
          totalPeri = Math.round(totalPeri * 1.1);
          setD(prev => ({
            ...prev,
            _deckSections: newSections,
            sqft: totalSqft > 0 ? totalSqft : prev.sqft,
            perimeter: totalPeri > 0 ? totalPeri : prev.perimeter,
          }));
        };
        const updateSection = (idx, field, val) => {
          const ns = [...sections];
          ns[idx] = { ...ns[idx], [field]: val };
          // If sqft is manually changed, clear W×L since the override takes priority
          if (field === "sqft") {
            ns[idx].w = "";
            ns[idx].l = "";
          }
          // If W or L changed, clear sqft override so it auto-calcs fresh
          if (field === "w" || field === "l") {
            ns[idx].sqft = "";
          }
          setSections(ns);
        };
        const addSection = () => setSections([...sections, { w: "", l: "", sqft: "" }]);
        const removeSection = (idx) => { if (sections.length > 1) setSections(sections.filter((_, i) => i !== idx)); };

        return (<div>
          <Head t="Deck Size" s="Enter your deck dimensions. We'll calculate square footage and perimeter for you." />

          {/* Dimensions header with guide button */}
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: lg ? 10 : 8 }}>
            <Lbl t="Deck Dimensions" />
            <button onClick={() => up("_dimGuide", !d._dimGuide)} style={{ background: C.aS, border: "none", borderRadius: 4, padding: "2px 8px", cursor: "pointer", fontFamily: F, fontSize: 9, fontWeight: 700, color: C.accent, marginBottom: 6 }}>{d._dimGuide ? "CLOSE" : "HOW TO MEASURE"}</button>
          </div>

          {/* Dimension measurement guide */}
          {d._dimGuide && (
            <div style={{ background: C.aS, borderRadius: 12, padding: lg ? "16px 20px" : "12px 14px", marginBottom: 14 }}>
              {IMG.guides.dimensions && <div style={{ width: "100%", marginBottom: 12, borderRadius: 8, overflow: "hidden" }}><img src={IMG.guides.dimensions} alt="How to measure your deck" style={{ width: "100%", display: "block", borderRadius: 8 }} /></div>}
              <span style={{ fontFamily: F, fontSize: lg ? 14 : 12, fontWeight: 700, color: C.text, display: "block", marginBottom: 8 }}>How To Measure Your Deck</span>
              <div style={{ fontFamily: F, fontSize: lg ? 12 : 11, color: C.muted, lineHeight: 1.7 }}>
                <p style={{ margin: "0 0 6px 0" }}><strong>Width</strong> is the side that runs along the house wall.</p>
                <p style={{ margin: "0 0 6px 0" }}><strong>Length</strong> is how far the deck extends out from the house.</p>
                <p style={{ margin: "0 0 6px 0" }}>For L-shaped or multi-level decks, add each section separately using the "+ Add Another Section" button below.</p>
                <p style={{ margin: 0, fontWeight: 600, color: C.text }}>Measure from outside edge to outside edge — include the frame.</p>
              </div>
            </div>
          )}

          {/* Section inputs */}
          {sections.map((sec, idx) => {
            const calcSqft = (Number(sec.w) > 0 && Number(sec.l) > 0) ? Math.round(Number(sec.w) * Number(sec.l)) : 0;
            const displaySqft = Number(sec.sqft) > 0 ? Number(sec.sqft) : calcSqft;
            return (
            <div key={idx} style={{ marginBottom: 12 }}>
              {sections.length > 1 && (
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 6 }}>
                  <span style={{ fontFamily: F, fontSize: lg ? 12 : 10, fontWeight: 700, color: C.accent }}>Section {idx + 1}</span>
                  <button onClick={() => removeSection(idx)} style={{ background: "none", border: "none", cursor: "pointer", fontFamily: F, fontSize: 10, color: C.dim, fontWeight: 600 }}>Remove</button>
                </div>
              )}
              <div style={{ display: "grid", gridTemplateColumns: lg ? "1fr 30px 1fr" : "1fr 24px 1fr", gap: 0, alignItems: "end", maxWidth: lg ? 440 : "none" }}>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  {idx === 0 && <label style={{ fontFamily: F, fontSize: lg ? 11 : 9, fontWeight: 700, color: C.muted, letterSpacing: "0.08em", textTransform: "uppercase" }}>Width (ft)</label>}
                  <input type="number" value={sec.w} min={4} max={100} placeholder="e.g. 12" onChange={e => updateSection(idx, "w", e.target.value)} style={{ background: C.card, border: `1.5px solid ${C.border}`, borderRadius: 8, padding: lg ? "13px 14px" : "10px 11px", color: C.text, fontFamily: F, fontSize: lg ? 15 : 14, outline: "none", width: "100%" }} onFocus={e => e.target.style.borderColor = C.accent} onBlur={e => e.target.style.borderColor = C.border} />
                </div>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "center", paddingBottom: 2 }}>
                  <span style={{ fontFamily: F, fontSize: lg ? 18 : 16, fontWeight: 700, color: C.dim }}>{"\u00D7"}</span>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  {idx === 0 && <label style={{ fontFamily: F, fontSize: lg ? 11 : 9, fontWeight: 700, color: C.muted, letterSpacing: "0.08em", textTransform: "uppercase" }}>Length (ft)</label>}
                  <input type="number" value={sec.l} min={4} max={100} placeholder="e.g. 20" onChange={e => updateSection(idx, "l", e.target.value)} style={{ background: C.card, border: `1.5px solid ${C.border}`, borderRadius: 8, padding: lg ? "13px 14px" : "10px 11px", color: C.text, fontFamily: F, fontSize: lg ? 15 : 14, outline: "none", width: "100%" }} onFocus={e => e.target.style.borderColor = C.accent} onBlur={e => e.target.style.borderColor = C.border} />
                </div>
              </div>
              {/* Per-section sqft — always visible, auto-calcs from W×L, overridable */}
              {sections.length > 1 && (
                <div style={{ display: "flex", alignItems: "center", gap: 8, marginTop: 6 }}>
                  <span style={{ fontFamily: F, fontSize: lg ? 11 : 9, color: C.dim }}>=</span>
                  <input type="number" value={displaySqft || ""} min={10} max={5000} placeholder="sq ft" onChange={e => updateSection(idx, "sqft", e.target.value)} style={{ background: C.bg, border: `1px solid ${Number(sec.sqft) > 0 && calcSqft > 0 && Number(sec.sqft) !== calcSqft ? C.accent : C.border}`, borderRadius: 6, padding: "5px 8px", color: C.text, fontFamily: F, fontSize: 13, fontWeight: 600, outline: "none", width: 70 }} onFocus={e => e.target.style.borderColor = C.accent} onBlur={e => e.target.style.borderColor = C.border} />
                  <span style={{ fontFamily: F, fontSize: lg ? 11 : 9, color: C.dim }}>sq ft</span>
                  {Number(sec.sqft) > 0 && calcSqft > 0 && Number(sec.sqft) !== calcSqft && (
                    <span style={{ fontFamily: F, fontSize: 8, color: C.accent, fontWeight: 600 }}>overridden</span>
                  )}
                </div>
              )}
            </div>
            );
          })}

          {/* Add section button */}
          <button onClick={addSection} style={{ background: "none", border: `1.5px dashed ${C.border}`, borderRadius: 8, padding: lg ? "10px 16px" : "8px 12px", cursor: "pointer", fontFamily: F, fontSize: lg ? 12 : 10, fontWeight: 600, color: C.accent, width: "100%", marginBottom: 20, transition: "all 0.2s" }}>+ Add Another Section</button>

          {/* Your Estimated Size summary */}
          {d.sqft > 0 && (
            <div style={{ background: C.card, border: `1.5px solid ${C.border}`, borderRadius: 12, padding: lg ? "18px 22px" : "14px 16px", marginBottom: 12 }}>
              <span style={{ fontFamily: F, fontSize: lg ? 15 : 13, fontWeight: 700, color: C.text, display: "block", marginBottom: 8 }}>Your Estimated Size</span>
              <div style={{ display: "flex", gap: lg ? 24 : 16, alignItems: "baseline", marginBottom: 8 }}>
                <div>
                  <span style={{ fontFamily: F, fontSize: lg ? 28 : 22, fontWeight: 800, color: C.accent }}>{d.sqft}</span>
                  <span style={{ fontFamily: F, fontSize: lg ? 14 : 12, fontWeight: 600, color: C.muted, marginLeft: 4 }}>sq ft</span>
                </div>
                <div>
                  <span style={{ fontFamily: F, fontSize: lg ? 28 : 22, fontWeight: 800, color: C.accent }}>{d.perimeter}</span>
                  <span style={{ fontFamily: F, fontSize: lg ? 14 : 12, fontWeight: 600, color: C.muted, marginLeft: 4 }}>linear ft perimeter</span>
                </div>
              </div>
              <span style={{ fontFamily: F, fontSize: lg ? 12 : 10, color: C.dim, lineHeight: 1.5, display: "block" }}>Calculated automatically from your dimensions. You can adjust these if your deck has multiple angles or sections.</span>

              {/* Editable overrides */}
              <div style={{ display: "grid", gridTemplateColumns: lg ? cols2 : "1fr", gap: lg ? 12 : 8, marginTop: 12 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <label style={{ fontFamily: F, fontSize: lg ? 11 : 9, fontWeight: 700, color: C.muted, whiteSpace: "nowrap" }}>Sq Ft</label>
                  <input type="number" value={d.sqft || ""} min={50} max={5000} onChange={e => setD(prev => ({ ...prev, sqft: Number(e.target.value) || 0 }))} style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 6, padding: "8px 10px", color: C.text, fontFamily: F, fontSize: 14, fontWeight: 600, outline: "none", flex: 1 }} onFocus={e => e.target.style.borderColor = C.accent} onBlur={e => e.target.style.borderColor = C.border} />
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                    <label style={{ fontFamily: F, fontSize: lg ? 11 : 9, fontWeight: 700, color: C.muted, whiteSpace: "nowrap" }}>Perimeter</label>
                    <button onClick={() => up("_periGuide", !d._periGuide)} style={{ background: C.aS, border: "none", borderRadius: 3, padding: "1px 5px", cursor: "pointer", fontFamily: F, fontSize: 8, fontWeight: 700, color: C.accent }}>{d._periGuide ? "\u2715" : "?"}</button>
                  </div>
                  <input type="number" value={d.perimeter || ""} min={10} max={500} onChange={e => up("perimeter", Number(e.target.value) || 0)} style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 6, padding: "8px 10px", color: C.text, fontFamily: F, fontSize: 14, fontWeight: 600, outline: "none", flex: 1 }} onFocus={e => e.target.style.borderColor = C.accent} onBlur={e => e.target.style.borderColor = C.border} />
                </div>
              </div>
            </div>
          )}

          {/* Perimeter guide */}
          {d._periGuide && (
            <div style={{ background: C.aS, borderRadius: 12, padding: lg ? "16px 20px" : "12px 14px", marginBottom: 12 }}>
              {IMG.guides.perimeter && <div style={{ width: "100%", marginBottom: 12, borderRadius: 8, overflow: "hidden" }}><img src={IMG.guides.perimeter} alt="How to measure perimeter" style={{ width: "100%", display: "block", borderRadius: 8 }} /></div>}
              <span style={{ fontFamily: F, fontSize: lg ? 14 : 12, fontWeight: 700, color: C.text, display: "block", marginBottom: 8 }}>How To Measure Perimeter</span>
              <div style={{ fontFamily: F, fontSize: lg ? 12 : 11, color: C.muted, lineHeight: 1.7 }}>
                <p style={{ margin: "0 0 6px 0" }}>Perimeter is the total length of the outer edges of your deck, excluding the house wall.</p>
                <p style={{ margin: "0 0 6px 0" }}>For a 12ft {"\u00D7"} 20ft deck against the house:</p>
                <p style={{ margin: "0 0 6px 0", color: C.accent, fontWeight: 600 }}>12ft (left) + 20ft (front) + 12ft (right) = 44 linear feet</p>
                <p style={{ margin: "0 0 6px 0" }}>L-shaped or multi-section decks will have more perimeter than a simple rectangle of the same square footage.</p>
                <p style={{ margin: 0, fontWeight: 600, color: C.text }}>When in doubt, estimate high {"\u2014"} this covers fascia and trim on every exposed edge.</p>
              </div>
            </div>
          )}

          {/* Shape hint */}
          <div style={{ textAlign: "center", marginTop: 8 }}>
            <span style={{ fontFamily: F, fontSize: lg ? 12 : 10, color: C.dim }}>Simple rectangle? You're all set. More complex shape? You can fine-tune above.</span>
          </div>
        </div>);
      }

      case "d-height": {
        const sections = d._deckSections || [{ w: "", l: "" }];
        const multiSection = sections.length > 1;
        const sectionDetails = d._sectionDetails || [];

        // Helper to get/set per-section detail
        const getSD = (idx) => sectionDetails[idx] || { height: 0, hasStairs: false, stairWidth: 4, stairStepCount: 0, stairSets: 1 };
        const setSD = (idx, updates) => {
          const newSD = [...sectionDetails];
          while (newSD.length <= idx) newSD.push({ height: 0, hasStairs: false, stairWidth: 4, stairStepCount: 0, stairSets: 1 });
          newSD[idx] = { ...newSD[idx], ...updates };
          // Sync top-level fields from first/primary section for calc compatibility
          const primary = newSD[0] || {};
          const totalHasStairs = newSD.some(s => s.hasStairs);
          const maxHeight = Math.max(...newSD.map(s => s.height || 0));
          const cat = maxHeight <= 1 ? "ground" : maxHeight <= 5 ? "few-steps" : "elevated";
          setD(prev => ({
            ...prev,
            _sectionDetails: newSD,
            exactHeight: primary.height || 0,
            postHeight: primary.height || 0,
            deckHeight: cat,
            hasStairs: totalHasStairs,
            stairStepCount: primary.stairStepCount || 0,
            stairWidth: primary.stairWidth || 4,
            stairSets: newSD.reduce((sum, s) => sum + (s.hasStairs ? (s.stairSets || 1) : 0), 0) || 1,
          }));
        };

        // For single section, use top-level state
        const ht = d.exactHeight || 0;
        const autoSteps = ht > 0 ? Math.ceil((ht * 12) / 7.5) : 0;
        const showSteps = d.stairStepCount > 0 ? d.stairStepCount : autoSteps;

        const onHeightChange = (e) => {
          const raw = e.target.value;
          const v = raw === "" ? 0 : Number(raw);
          if (isNaN(v)) return;
          const cat = v <= 1 ? "ground" : v <= 5 ? "few-steps" : "elevated";
          const steps = v > 0 ? Math.ceil((v * 12) / 7.5) : 0;
          setD(prev => ({
            ...prev,
            exactHeight: v, postHeight: v, deckHeight: cat,
            hasStairs: v > 1, stairStepCount: steps,
          }));
        };

        // Section height/stairs renderer
        const renderSectionHeight = (idx, label) => {
          const sd = getSD(idx);
          const secHt = sd.height || 0;
          const secAutoSteps = secHt > 0 ? Math.ceil((secHt * 12) / 7.5) : 0;
          const secShowSteps = sd.stairStepCount > 0 ? sd.stairStepCount : secAutoSteps;

          return (
            <div key={idx} style={{ background: C.card, border: `1.5px solid ${C.border}`, borderRadius: 12, padding: lg ? "16px 18px" : "12px 14px", marginBottom: 12 }}>
              <span style={{ fontFamily: F, fontSize: lg ? 14 : 12, fontWeight: 700, color: C.accent, display: "block", marginBottom: 10 }}>{label}</span>

              <div style={{ display: "grid", gridTemplateColumns: lg ? cols2 : "1fr", gap: lg ? 12 : 8, marginBottom: 12 }}>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  <label style={{ fontFamily: F, fontSize: lg ? 11 : 9, fontWeight: 700, color: C.muted, letterSpacing: "0.08em", textTransform: "uppercase" }}>Height Off The Ground (ft)</label>
                  <input type="number" value={secHt || ""} min={0} max={30} step={0.5} placeholder="e.g. 3.5" onChange={e => {
                    const v = Number(e.target.value) || 0;
                    setSD(idx, { height: v, hasStairs: v > 1, stairStepCount: v > 0 ? Math.ceil((v * 12) / 7.5) : 0 });
                  }} style={{ background: C.bg, border: `1.5px solid ${C.border}`, borderRadius: 8, padding: lg ? "13px 14px" : "10px 11px", color: C.text, fontFamily: F, fontSize: lg ? 15 : 14, outline: "none", width: "100%" }} onFocus={e => e.target.style.borderColor = C.accent} onBlur={e => e.target.style.borderColor = C.border} />
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 4, justifyContent: "center" }}>
                  {secHt > 1 && <span style={{ fontFamily: F, fontSize: lg ? 14 : 12, color: C.accent, fontWeight: 600 }}>{"\u2248"} {secAutoSteps} steps</span>}
                  {secHt > 0 && secHt <= 1 && <span style={{ fontFamily: F, fontSize: lg ? 12 : 10, color: C.muted }}>Ground level</span>}
                </div>
              </div>

              <div style={{ display: "flex", gap: 8, marginBottom: sd.hasStairs ? 12 : 0 }}>
                {[{ v: true, l: "Stairs" }, { v: false, l: "No Stairs" }].map(o => (
                  <button key={String(o.v)} onClick={() => setSD(idx, { hasStairs: o.v })} style={{
                    flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 4,
                    background: sd.hasStairs === o.v ? "rgba(76,175,80,0.08)" : C.card,
                    border: `1.5px solid ${sd.hasStairs === o.v ? "#4CAF50" : C.border}`,
                    borderRadius: 8, padding: "10px", cursor: "pointer", fontFamily: F, fontSize: lg ? 12 : 10, fontWeight: 600,
                    color: sd.hasStairs === o.v ? "#2E7D32" : C.text, transition: "all 0.2s",
                  }}>
                    {sd.hasStairs === o.v && <span style={{ color: "#4CAF50", fontWeight: 700 }}>{"\u2713"}</span>}
                    {o.l}
                  </button>
                ))}
              </div>

              {sd.hasStairs && (
                <div style={{ display: "grid", gridTemplateColumns: lg ? "1fr 1fr 1fr" : "1fr 1fr", gap: 8, marginTop: 4 }}>
                  <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                    <label style={{ fontFamily: F, fontSize: 9, fontWeight: 700, color: C.muted, textTransform: "uppercase" }}>Width (ft)</label>
                    <input type="number" value={sd.stairWidth || 4} min={2} max={12} step={0.5} onChange={e => setSD(idx, { stairWidth: Number(e.target.value) || 4 })} style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 6, padding: "8px 10px", color: C.text, fontFamily: F, fontSize: 13, fontWeight: 600, outline: "none", width: "100%" }} />
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                    <label style={{ fontFamily: F, fontSize: 9, fontWeight: 700, color: C.muted, textTransform: "uppercase" }}>Steps</label>
                    <input type="number" value={secShowSteps || ""} min={1} max={50} onChange={e => setSD(idx, { stairStepCount: Number(e.target.value) || 0 })} style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 6, padding: "8px 10px", color: C.text, fontFamily: F, fontSize: 13, fontWeight: 600, outline: "none", width: "100%" }} />
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                    <label style={{ fontFamily: F, fontSize: 9, fontWeight: 700, color: C.muted, textTransform: "uppercase" }}>Stair Runs</label>
                    <input type="number" value={sd.stairSets || 1} min={1} max={4} onChange={e => setSD(idx, { stairSets: Number(e.target.value) || 1 })} style={{ background: C.bg, border: `1px solid ${C.border}`, borderRadius: 6, padding: "8px 10px", color: C.text, fontFamily: F, fontSize: 13, fontWeight: 600, outline: "none", width: "100%" }} />
                  </div>
                </div>
              )}
            </div>
          );
        };

        return (<div>
          <Head t="Deck Height & Stairs" s="Tell us how your deck connects to the ground. We'll use this to estimate structure and stair costs." />

          {/* Guide button */}
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: lg ? 6 : 4 }}>
            <Lbl t="Deck Height" />
            <button onClick={() => up("_heightGuide", !d._heightGuide)} style={{ background: C.aS, border: "none", borderRadius: 4, padding: "2px 8px", cursor: "pointer", fontFamily: F, fontSize: 9, fontWeight: 700, color: C.accent, marginBottom: 6 }}>{d._heightGuide ? "CLOSE" : "HOW TO MEASURE"}</button>
          </div>

          {d._heightGuide && (
            <div style={{ background: C.aS, borderRadius: 12, padding: lg ? "16px 20px" : "12px 14px", marginBottom: 14 }}>
              {IMG.guides.deckHeight && <div style={{ width: "100%", marginBottom: 12, borderRadius: 8, overflow: "hidden" }}><img src={IMG.guides.deckHeight} alt="How to measure deck height" style={{ width: "100%", display: "block", borderRadius: 8 }} /></div>}
              <span style={{ fontFamily: F, fontSize: lg ? 14 : 12, fontWeight: 700, color: C.text, display: "block", marginBottom: 8 }}>How To Measure Deck Height</span>
              <div style={{ fontFamily: F, fontSize: lg ? 12 : 11, color: C.muted, lineHeight: 1.7 }}>
                <p style={{ margin: "0 0 6px 0" }}>Measure from the <strong>ground</strong> straight up to the <strong>top of the finished deck surface</strong>.</p>
                <p style={{ margin: "0 0 6px 0" }}>If your yard slopes, measure from the lowest point where the deck will be supported.</p>
                <p style={{ margin: 0, fontWeight: 600, color: C.text }}>Not sure? A standard door threshold is about 8 inches above grade. Count the steps from your door down to ground level and multiply by 7.5 inches.</p>
              </div>
            </div>
          )}

          {/* Single section: simple flow */}
          {!multiSection && (<>
            <div style={{ display: "grid", gridTemplateColumns: lg ? cols2 : "1fr", gap: lg ? 12 : 8, marginBottom: 20 }}>
              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                <label style={{ fontFamily: F, fontSize: lg ? 11 : 9, fontWeight: 700, color: C.muted, letterSpacing: "0.08em", textTransform: "uppercase" }}>Height Off The Ground (ft)</label>
                <input type="number" value={ht || ""} min={0} max={30} step={0.5} onChange={onHeightChange} placeholder="e.g. 3.5" style={{ background: C.card, border: `1.5px solid ${C.border}`, borderRadius: 8, padding: lg ? "13px 14px" : "10px 11px", color: C.text, fontFamily: F, fontSize: lg ? 15 : 14, outline: "none", width: "100%" }} onFocus={e => e.target.style.borderColor = C.accent} onBlur={e => e.target.style.borderColor = C.border} />
                <span style={{ fontFamily: F, fontSize: lg ? 11 : 9, color: C.dim }}>From ground to top of deck surface</span>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 4, justifyContent: "center" }}>
                {ht > 1 && <span style={{ fontFamily: F, fontSize: lg ? 15 : 13, color: C.accent, fontWeight: 700 }}>{"\u2248"} {autoSteps} steps at this height</span>}
                {ht > 0 && ht <= 1 && <span style={{ fontFamily: F, fontSize: lg ? 13 : 11, color: C.muted }}>Ground level {"\u2014"} likely no stairs needed</span>}
              </div>
            </div>

            <Lbl t="Stairs" />
            <span style={{ fontFamily: F, fontSize: lg ? 13 : 11, color: C.muted, display: "block", marginBottom: 10 }}>Will your deck need stairs?</span>
            <div style={{ display: "flex", gap: lg ? 12 : 8, marginBottom: d.hasStairs ? 20 : 0 }}>
              {[{ v: true, l: "Yes \u2014 Include Stairs" }, { v: false, l: "No Stairs Needed" }].map(o => (
                <button key={String(o.v)} onClick={() => up("hasStairs", o.v)} style={{
                  flex: 1, display: "flex", alignItems: "center", justifyContent: "center", gap: 6,
                  background: d.hasStairs === o.v ? "rgba(76,175,80,0.08)" : C.card,
                  border: `2px solid ${d.hasStairs === o.v ? "#4CAF50" : C.border}`,
                  borderRadius: lg ? 12 : 10, padding: lg ? "14px" : "12px",
                  cursor: "pointer", fontFamily: F, fontSize: lg ? 14 : 12, fontWeight: 600,
                  color: d.hasStairs === o.v ? "#2E7D32" : C.text, transition: "all 0.2s",
                }}>
                  {d.hasStairs === o.v && <span style={{ color: "#4CAF50", fontSize: 16, fontWeight: 700 }}>{"\u2713"}</span>}
                  {o.l}
                </button>
              ))}
            </div>

            {d.hasStairs && (
              <div style={{ display: "grid", gridTemplateColumns: lg ? "1fr 1fr 1fr" : "1fr", gap: lg ? 14 : 10, marginTop: 8 }}>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  <label style={{ fontFamily: F, fontSize: lg ? 11 : 9, fontWeight: 700, color: C.muted, letterSpacing: "0.08em", textTransform: "uppercase" }}>Stair Width (ft)</label>
                  <input type="number" value={d.stairWidth || 4} min={2} max={12} step={0.5} onChange={e => up("stairWidth", Number(e.target.value) || 4)} style={{ background: C.card, border: `1.5px solid ${C.border}`, borderRadius: 8, padding: lg ? "13px 14px" : "10px 11px", color: C.text, fontFamily: F, fontSize: lg ? 15 : 14, outline: "none", width: "100%" }} onFocus={e => e.target.style.borderColor = C.accent} onBlur={e => e.target.style.borderColor = C.border} />
                  <span style={{ fontFamily: F, fontSize: lg ? 10 : 8, color: C.dim }}>Most decks use 4ft wide stairs</span>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  <label style={{ fontFamily: F, fontSize: lg ? 11 : 9, fontWeight: 700, color: C.muted, letterSpacing: "0.08em", textTransform: "uppercase" }}>Number Of Steps</label>
                  <input type="number" value={showSteps || ""} min={1} max={50} onChange={e => up("stairStepCount", Number(e.target.value) || 0)} placeholder="auto" style={{ background: C.card, border: `1.5px solid ${C.border}`, borderRadius: 8, padding: lg ? "13px 14px" : "10px 11px", color: C.text, fontFamily: F, fontSize: lg ? 15 : 14, outline: "none", width: "100%" }} onFocus={e => e.target.style.borderColor = C.accent} onBlur={e => e.target.style.borderColor = C.border} />
                  <span style={{ fontFamily: F, fontSize: lg ? 10 : 8, color: C.dim }}>Calculated from height {"\u2014"} adjust if needed. A typical step is about 7{"\u2013"}8 inches tall.</span>
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                  <label style={{ fontFamily: F, fontSize: lg ? 11 : 9, fontWeight: 700, color: C.muted, letterSpacing: "0.08em", textTransform: "uppercase" }}>Number Of Stair Runs</label>
                  <input type="number" value={d.stairSets || 1} min={1} max={4} onChange={e => up("stairSets", Number(e.target.value) || 1)} style={{ background: C.card, border: `1.5px solid ${C.border}`, borderRadius: 8, padding: lg ? "13px 14px" : "10px 11px", color: C.text, fontFamily: F, fontSize: lg ? 15 : 14, outline: "none", width: "100%" }} onFocus={e => e.target.style.borderColor = C.accent} onBlur={e => e.target.style.borderColor = C.border} />
                  <span style={{ fontFamily: F, fontSize: lg ? 10 : 8, color: C.dim }}>Use more than one if you want access from multiple sides</span>
                </div>
              </div>
            )}
          </>)}

          {/* Multi-section: per-section height and stairs */}
          {multiSection && (<>
            <p style={{ fontFamily: F, fontSize: lg ? 13 : 11, color: C.muted, marginBottom: 12, lineHeight: 1.5 }}>You have {sections.length} deck sections. Each section can have a different height and stair configuration.</p>
            {sections.map((sec, idx) => {
              const w = Number(sec.w) || 0;
              const l = Number(sec.l) || 0;
              const label = `Section ${idx + 1}` + (w > 0 && l > 0 ? ` (${w}ft \u00D7 ${l}ft)` : "");
              return renderSectionHeight(idx, label);
            })}
          </>)}
        </div>);
      }
      case "d-structural": {
        // Calculate suggested values from actual entered dimensions
        const sections = d._deckSections || [];
        const enteredW = sections[0] ? Number(sections[0].w) || 0 : 0;
        const enteredL = sections[0] ? Number(sections[0].l) || 0 : 0;
        const longerSide = Math.max(enteredW, enteredL);
        const suggestedBeam = d.beamLinFt || (longerSide > 0 ? Math.round(longerSide * 1.1) : Math.round(Math.max(Math.sqrt(d.sqft * 0.6), d.sqft / Math.sqrt(d.sqft * 0.6)) * 1.1));
        const suggestedFtg = d.footingCount || Math.max(2, Math.ceil(suggestedBeam / 10) + 1);
        const suggestedPosts = d.postCount || suggestedFtg; // posts = footings
        const suggestedHeight = d.postHeight || d.exactHeight || 5;

        return (<div>
          <Head t="Structural Setup" s="We've estimated your structure based on your deck size. Adjust these only if you know your layout." />

          {/* Guide button */}
          <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: lg ? 6 : 4 }}>
            <Lbl t="Posts & Beams" />
            <button onClick={() => up("_structGuide", !d._structGuide)} style={{ background: C.aS, border: "none", borderRadius: 4, padding: "2px 8px", cursor: "pointer", fontFamily: F, fontSize: 9, fontWeight: 700, color: C.accent, marginBottom: 6 }}>{d._structGuide ? "CLOSE" : "WHAT IS THIS?"}</button>
          </div>

          {d._structGuide && (
            <div style={{ background: C.aS, borderRadius: 12, padding: lg ? "16px 20px" : "12px 14px", marginBottom: 14 }}>
              {IMG.guides.structural && <div style={{ width: "100%", marginBottom: 12, borderRadius: 8, overflow: "hidden" }}><img src={IMG.guides.structural} alt="Structural components" style={{ width: "100%", display: "block", borderRadius: 8 }} /></div>}
              <span style={{ fontFamily: F, fontSize: lg ? 14 : 12, fontWeight: 700, color: C.text, display: "block", marginBottom: 8 }}>Understanding Your Deck Structure</span>
              <div style={{ fontFamily: F, fontSize: lg ? 12 : 11, color: C.muted, lineHeight: 1.7 }}>
                <p style={{ margin: "0 0 6px 0" }}><strong>Posts</strong> are the vertical 6x6 supports that hold your deck up.</p>
                <p style={{ margin: "0 0 6px 0" }}><strong>Beams</strong> are the horizontal members that run along the top of the posts and support the joists.</p>
                <p style={{ margin: "0 0 6px 0" }}><strong>Footings</strong> are the concrete foundations that anchor each post to the ground.</p>
                <p style={{ margin: 0, fontWeight: 600, color: C.text }}>Most homeowners don't need to adjust these. We've estimated them based on your deck size and height.</p>
              </div>
            </div>
          )}

          {/* Collapsible advanced inputs */}
          <button onClick={() => up("_showStructInputs", !d._showStructInputs)} style={{
            width: "100%", background: C.card, border: `1.5px solid ${C.border}`, borderRadius: 10,
            padding: lg ? "14px 18px" : "12px 14px", cursor: "pointer", textAlign: "left",
            display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: d._showStructInputs ? 14 : 0,
          }}>
            <span style={{ fontFamily: F, fontSize: lg ? 13 : 11, fontWeight: 600, color: C.text }}>
              {d._showStructInputs ? "Hide structural details" : "Adjust structural details (advanced)"}
            </span>
            <span style={{ fontFamily: F, fontSize: lg ? 16 : 14, color: C.dim }}>{d._showStructInputs ? "\u25B2" : "\u25BC"}</span>
          </button>

          {d._showStructInputs && (
            <div style={{ display: "grid", gridTemplateColumns: lg ? cols2 : "1fr", gap: lg ? 14 : 10, marginBottom: 20 }}>
              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                <label style={{ fontFamily: F, fontSize: lg ? 11 : 9, fontWeight: 700, color: C.muted, letterSpacing: "0.08em", textTransform: "uppercase" }}>Number Of Posts</label>
                <input type="number" value={d.postCount || suggestedPosts} min={0} max={40} onChange={e => up("postCount", Number(e.target.value) || 0)} style={{ background: C.card, border: `1.5px solid ${C.border}`, borderRadius: 8, padding: lg ? "13px 14px" : "10px 11px", color: C.text, fontFamily: F, fontSize: lg ? 15 : 14, outline: "none", width: "100%" }} onFocus={e => e.target.style.borderColor = C.accent} onBlur={e => e.target.style.borderColor = C.border} />
                <span style={{ fontFamily: F, fontSize: lg ? 10 : 8, color: C.dim }}>6x6 posts supporting your deck structure</span>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                <label style={{ fontFamily: F, fontSize: lg ? 11 : 9, fontWeight: 700, color: C.muted, letterSpacing: "0.08em", textTransform: "uppercase" }}>Post Height (ft)</label>
                <input type="number" value={d.postHeight || suggestedHeight} min={0.5} max={20} step={0.5} onChange={e => up("postHeight", Number(e.target.value) || 0)} style={{ background: C.card, border: `1.5px solid ${C.border}`, borderRadius: 8, padding: lg ? "13px 14px" : "10px 11px", color: C.text, fontFamily: F, fontSize: lg ? 15 : 14, outline: "none", width: "100%" }} onFocus={e => e.target.style.borderColor = C.accent} onBlur={e => e.target.style.borderColor = C.border} />
                <span style={{ fontFamily: F, fontSize: lg ? 10 : 8, color: C.dim }}>Based on your deck height</span>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                <label style={{ fontFamily: F, fontSize: lg ? 11 : 9, fontWeight: 700, color: C.muted, letterSpacing: "0.08em", textTransform: "uppercase" }}>Beam Length (lin ft)</label>
                <input type="number" value={d.beamLinFt || suggestedBeam} min={0} max={200} onChange={e => up("beamLinFt", Number(e.target.value) || 0)} style={{ background: C.card, border: `1.5px solid ${C.border}`, borderRadius: 8, padding: lg ? "13px 14px" : "10px 11px", color: C.text, fontFamily: F, fontSize: lg ? 15 : 14, outline: "none", width: "100%" }} onFocus={e => e.target.style.borderColor = C.accent} onBlur={e => e.target.style.borderColor = C.border} />
                <span style={{ fontFamily: F, fontSize: lg ? 10 : 8, color: C.dim }}>Total length of beams supporting the frame</span>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                <label style={{ fontFamily: F, fontSize: lg ? 11 : 9, fontWeight: 700, color: C.muted, letterSpacing: "0.08em", textTransform: "uppercase" }}>Number Of Footings</label>
                <input type="number" value={d.footingCount || suggestedFtg} min={0} max={40} onChange={e => up("footingCount", Number(e.target.value) || 0)} style={{ background: C.card, border: `1.5px solid ${C.border}`, borderRadius: 8, padding: lg ? "13px 14px" : "10px 11px", color: C.text, fontFamily: F, fontSize: lg ? 15 : 14, outline: "none", width: "100%" }} onFocus={e => e.target.style.borderColor = C.accent} onBlur={e => e.target.style.borderColor = C.border} />
                <span style={{ fontFamily: F, fontSize: lg ? 10 : 8, color: C.dim }}>Typically matches your post layout</span>
              </div>
            </div>
          )}

          {/* Footing Type */}
          <div style={{ marginTop: d._showStructInputs ? 0 : 20 }}>
            <Lbl t="Footing Type" />
            <div style={{ display: "grid", gridTemplateColumns: lg ? "1fr 1fr 1fr" : "1fr", gap: lg ? 10 : 8 }}>
              {[
                { v: "standard", l: "Standard Footings", badge: "Recommended", d: "Concrete, helical piers, or ground screws", d2: "Used for most deck structures", imgKey: "footingStandard" },
                { v: "engineered", l: "Engineered Footings", d: "Designed for heavier loads", d2: "Used for roofs, hot tubs, or complex structures", imgKey: "footingEngineered" },
                { v: "mixed", l: "Mixed / Not Sure", d: "We'll account for both where needed to our best ability", d2: "May create a wider cost range. Most projects include a combination." },
              ].map(o => {
                const showImg = o.imgKey && d["_showFooting_" + o.v];
                const guideImg = o.imgKey ? IMG.guides[o.imgKey] : "";
                return (
                  <div key={o.v}>
                    <button onClick={() => up("footingType", o.v)} style={{
                      width: "100%", padding: lg ? "16px" : "14px", textAlign: "left",
                      background: d.footingType === o.v ? "rgba(76,175,80,0.08)" : C.card,
                      border: `2px solid ${d.footingType === o.v ? "#4CAF50" : C.border}`,
                      borderRadius: showImg ? "10px 10px 0 0" : lg ? 12 : 10, cursor: "pointer", transition: "all 0.2s", position: "relative",
                    }}>
                      {d.footingType === o.v && <div style={{ position: "absolute", top: 8, right: 8, width: 20, height: 20, borderRadius: "50%", background: "#4CAF50", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, color: "#fff", fontWeight: 700 }}>{"\u2713"}</div>}
                      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 4 }}>
                        <span style={{ fontFamily: F, fontSize: lg ? 14 : 12, fontWeight: 700, color: d.footingType === o.v ? "#2E7D32" : C.text }}>{o.l}</span>
                        {o.badge && <span style={{ fontFamily: F, fontSize: 8, fontWeight: 700, color: C.accent, background: C.aS, padding: "2px 6px", borderRadius: 4 }}>{o.badge}</span>}
                      </div>
                      <span style={{ fontFamily: F, fontSize: lg ? 12 : 10, color: C.muted, display: "block", lineHeight: 1.4 }}>{o.d}</span>
                      <span style={{ fontFamily: F, fontSize: lg ? 11 : 9, color: C.dim, display: "block", marginTop: 3, fontStyle: "italic" }}>{o.d2}</span>
                      {o.imgKey && (
                        <span onClick={(e) => { e.stopPropagation(); up("_showFooting_" + o.v, !d["_showFooting_" + o.v]); }} style={{ fontFamily: F, fontSize: 9, fontWeight: 700, color: C.accent, background: C.aS, padding: "3px 8px", borderRadius: 4, marginTop: 8, display: "inline-block", cursor: "pointer" }}>{showImg ? "HIDE" : "SEE EXAMPLE"}</span>
                      )}
                    </button>
                    {showImg && (
